apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
  namespace: kube-system
spec:
  interval: 30m
  chart:
    spec:
      chart: cilium
      version: '1.19.1'
      sourceRef:
        kind: HelmRepository
        name: cilium
        namespace: flux-system
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    ipam:
      mode: kubernetes
    routingMode: tunnel
    tunnelProtocol: vxlan
    gatewayAPI:
      enabled: true
    kubeProxyReplacement: true
    encryption:
      enabled: true
      type: ipsec
      ipsec:
        keyFile: keys
    authentication:
      enabled: true
      mutual:
        spire:
          enabled: true
          install:
            enabled: true
    operator:
      replicas: 1
