  namespace: openbao
spec:
  secretName: vault-internal-tls
  issuerRef:
    name: internal-ca-issuer
    kind: ClusterIssuer
  dnsNames:
  - openbao-openbao-0.openbao-openbao-internal.openbao.svc.cluster.local
  - openbao-openbao-1.openbao-openbao-internal.openbao.svc.cluster.local
  - openbao-openbao-2.openbao-openbao-internal.openbao.svc.cluster.local
  - openbao-openbao-internal.openbao.svc.cluster.local
  - openbao-openbao.openbao.svc.cluster.local
  - localhost