apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: siyuan
  namespace: siyuan
spec:
  parentRefs:
  - name: cilium-gateway
    namespace: kube-system
  hostnames:
  - "siyuan.xzr.es"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: "/"
    backendRefs:
    - name: siyuan
      port: 80
